name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: no-spend-gate-check
        run: |
          set -e
          FORBIDDEN='CDB_MAX_SPEND_USD|MAX_SPEND_USD|DEFAULT_MAX_SPEND|spend_cap|cost_cap|cost-cap-usd|--max-spend'
          HITS=$(git grep -nE "$FORBIDDEN" -- \
            ':(exclude)docs/status/' \
            ':(exclude)docs/INCIDENTS/' \
            ':(exclude)docs/3rdpartyreviews/' \
            ':(exclude)docs/proposals/' \
            ':(exclude)docs/PROMPT_EVOLUTION_LOG.md' \
            ':(exclude).github/workflows/ci.yml' \
            | grep -v 'noqa: spend-gate-check' \
            || true)
          if [ -n "$HITS" ]; then
            echo "::error::Forbidden spend-gate token(s) detected:"
            echo "$HITS"
            echo ""
            echo "See ARCHITECTURE.md §6.2, CLAUDE.md rule 14, SECURITY_AND_HARDENING.md R13."
            exit 1
          fi
          echo "no-spend-gate-check: PASS"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Type check with mypy
        run: uv run mypy packages/ --ignore-missing-imports

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Check no LLM imports in cdb_analyze
        run: uv run python scripts/check_no_llm_imports.py

  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
